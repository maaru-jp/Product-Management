<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>MAARU 後台</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Cloudinary -->
  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>
</head>
<body>
  <h1>商品上架</h1>

  <input id="name" placeholder="商品名稱"><br>
  <input id="price" type="number" placeholder="價格"><br>

  <select id="category">
    <option value="吊飾">吊飾</option>
    <option value="玩偶">玩偶</option>
    <option value="文具">文具</option>
    <option value="雜貨">雜貨</option>
  </select><br>

  <input id="tags" placeholder="標籤（逗號分隔）"><br>

  <label>
    <input type="checkbox" id="soldout"> 已售完
  </label><br><br>

  <button id="upload">上傳圖片</button><br>
  <img id="preview" width="150"><br><br>

  <button onclick="save()">儲存商品</button>

  <script src="firebase.js"></script>
  <script src="admin.js"></script>
</body>
</html>
