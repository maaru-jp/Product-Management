<!DOCTYPE html>
<html>
<body>
<h2>新增商品</h2>
<input id="name" placeholder="商品名稱">
<input id="price" type="number" placeholder="價格">
<input type="file" id="imageInput" multiple>
<div id="preview"></div>
<button onclick="save()">儲存</button>

<script type="module">
import { db } from '../js/firebase.js';
import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const CLOUD_NAME="YOUR_CLOUD";
const UPLOAD_PRESET="maaru_unsigned";
let images=[];

imageInput.onchange = async e => {
  images=[]; preview.innerHTML="";
  for(const f of e.target.files){
    const fd=new FormData();
    fd.append("file",f);
    fd.append("upload_preset",UPLOAD_PRESET);
    const r=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{method:"POST",body:fd});
    const d=await r.json();
    images.push(d.secure_url);
    const img=document.createElement("img"); img.src=d.secure_url; img.width=80;
    preview.appendChild(img);
  }
};

window.save = async ()=>{
  await addDoc(collection(db,"products"),{
    name:name.value,
    price:Number(price.value),
    images:images,
    createdAt:Date.now()
  });
  location.href="dashboard.html";
};
</script>
</body>
</html>
