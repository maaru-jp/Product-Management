<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OMO ADMIN｜商品管理</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#FFF3F3;
      --panel:#FFFFFF;
      --primary:#FF7A9E;
      --primary-weak:#FFE0E8;
      --text:#2B2B2B;
      --muted:#8A8A8A;
      --line:#EAEAEA;
      --success:#20B26B;
      --danger:#E5484D;
      --sidebar:#0F0F12;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:'Noto Sans TC',system-ui,-apple-system; color:var(--text); background:var(--bg)}
    a{color:inherit;text-decoration:none}

    /* Layout */
    .app{display:grid; grid-template-columns: 240px 1fr; min-height:100vh}
    .sidebar{background:var(--sidebar); color:#fff; padding:18px}
    .brand{font-weight:700; letter-spacing:.5px; margin-bottom:18px}
    .brand small{opacity:.7}
    .nav a{display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; color:#EDEDED; margin-bottom:6px}
    .nav a.active,.nav a:hover{background:#1B1B22}
    .nav .sp{height:10px}
    .logout{position:sticky; top:calc(100vh - 80px); margin-top:24px}
    .logout a{display:block; padding:10px 12px; border-radius:10px; background:#1B1B22}

    .main{padding:20px}
    .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px}
    .topbar h1{font-size:22px; margin:0}
    .topbar .link{opacity:.8}

    /* Toolbar */
    .toolbar{display:flex; gap:12px; align-items:center; background:var(--panel); padding:14px; border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.04)}
    .btn{border:1px solid var(--line); background:#fff; padding:10px 14px; border-radius:12px; cursor:pointer; font-weight:600}
    .btn.primary{background:var(--primary); color:#fff; border-color:transparent}
    .btn.ghost{background:#fff}
    .search{flex:1; display:flex; gap:8px; align-items:center; border:1px solid var(--line); border-radius:12px; padding:10px 12px}
    .search input{border:none; outline:none; flex:1}

    /* Table */
    .card{margin-top:14px; background:var(--panel); border-radius:14px; box-shadow:0 10px 30px rgba(0,0,0,.04)}
    table{width:100%; border-collapse:separate; border-spacing:0}
    thead th{font-size:12px; color:var(--muted); text-align:left; padding:12px 14px; border-bottom:1px solid var(--line)}
    tbody td{padding:14px; border-bottom:1px solid var(--line); vertical-align:middle}
    tbody tr:last-child td{border-bottom:none}
    .thumb{width:44px; height:44px; border-radius:10px; object-fit:cover; border:1px solid var(--line)}
    .price{font-weight:700}
    .profit{color:var(--success); font-weight:700}

    /* Switch */
    .switch{position:relative; width:46px; height:26px}
    .switch input{display:none}
    .slider{position:absolute; inset:0; background:#DDD; border-radius:999px; cursor:pointer}
    .slider:before{content:""; position:absolute; width:20px; height:20px; left:3px; top:3px; background:#fff; border-radius:50%; transition:.2s}
    .switch input:checked + .slider{background:var(--success)}
    .switch input:checked + .slider:before{transform:translateX(20px)}

    .actions{display:flex; gap:8px}
    .chip{padding:6px 10px; border-radius:999px; font-size:12px}
    .chip.on{background:#E9F7EF; color:#1F8A5C}

    /* Modal */
    .modal{position:fixed; inset:0; background:rgba(0,0,0,.35); display:none; align-items:center; justify-content:center}
    .modal .panel{width:min(640px, 92vw); background:#fff; border-radius:16px; padding:18px}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .field{display:flex; flex-direction:column; gap:6px}
    .field input,.field textarea{border:1px solid var(--line); border-radius:12px; padding:10px}
    .panel footer{display:flex; justify-content:flex-end; gap:10px; margin-top:12px}

    @media (max-width:900px){
      .app{grid-template-columns:1fr}
      .sidebar{display:none}
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">OMO ADMIN<br><small>— MAARU 日本萌GO</small></div>
    <nav class="nav">
      <a href="#">總覽報表</a>
      <a href="#">訂單管理</a>
      <a class="active" href="#">商品管理</a>
      <a href="#">首頁排版</a>
      <a href="#">採購統計</a>
      <a href="#">網站設定</a>
    </nav>
    <div class="logout"><a href="#">登出</a></div>
  </aside>

  <main class="main">
    <div class="topbar">
      <h1>商品管理</h1>
      <a class="link" href="index.html" target="_blank">前往官網 ↗</a>
    </div>

    <section class="toolbar">
      <button class="btn primary" onclick="openModal()">＋ 新增商品</button>
      <button class="btn ghost">匯出 CSV</button>
      <div class="search">
        🔍 <input placeholder="搜尋商品名稱、分類、品牌…" />
      </div>
      <button class="btn ghost">搜尋</button>
    </section>

    <section class="card">
      <table>
        <thead>
          <tr>
            <th>編號</th><th>圖片</th><th>名稱</th><th>售價</th><th>利潤</th><th>原價(KRW)</th><th>成本</th><th>庫存</th><th>狀態</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>
  </main>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="panel">
    <h3>新增 / 編輯商品</h3>
    <div class="grid">
      <div class="field"><label>商品編號</label><input id="pid" /></div>
      <div class="field"><label>商品名稱</label><input id="pname" /></div>
      <div class="field"><label>售價</label><input id="pprice" type="number" /></div>
      <div class="field"><label>原價(KRW)</label><input id="pkrw" type="number" /></div>
      <div class="field"><label>圖片 URL（Cloudinary）</label><input id="pimg" /></div>
      <div class="field"><label>庫存</label><input id="pstock" type="number" /></div>
      <div class="field" style="grid-column:1/-1"><label>描述</label><textarea id="pdesc" rows="3"></textarea></div>
    </div>
    <footer>
      <button class="btn ghost" onclick="closeModal()">取消</button>
      <button class="btn primary" onclick="save()">儲存</button>
    </footer>
  </div>
</div>

<script>
  // Demo data（實務請改為 products.js / 或之後接 Sheet）
  const data = [
    {id:'P1769865061826276', img:'https://res.cloudinary.com/demo/image/upload/w_200/sample.jpg', name:'手機吊鏈', price:499, profit:499, krw:2000, cost:0, stock:1, on:true}
  ];

  const rows = document.getElementById('rows');
  function render(){
    rows.innerHTML='';
    data.forEach(p=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td><a href="#" style="color:#6C7CFF">${p.id}</a></td>
        <td><img class="thumb" src="${p.img}"></td>
        <td>${p.name}</td>
        <td class="price">${p.price}</td>
        <td class="profit">${p.profit}</td>
        <td>₩${p.krw}</td>
        <td>${p.cost}</td>
        <td>${p.stock}</td>
        <td><span class="chip on">上架中</span></td>
        <td class="actions"><button class="btn ghost">編輯</button><button class="btn" style="color:var(--danger)">刪除</button></td>`;
      rows.appendChild(tr);
    });
  }
  render();

  const modal=document.getElementById('modal');
  function openModal(){ modal.style.display='flex' }
  function closeModal(){ modal.style.display='none' }
  function save(){ closeModal() }
</script>
</body>
</html>
