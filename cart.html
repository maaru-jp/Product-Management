<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>購物車</title></head>
<body>
<h1>購物車</h1>
<div id="cart"></div>
<button onclick="checkout()">結帳（LINE）</button>

<script>
let cart = JSON.parse(localStorage.getItem("cart")||"[]");
const box = document.getElementById("cart");

function save(){localStorage.setItem("cart",JSON.stringify(cart)); render();}

function render(){
  box.innerHTML="";
  let total=0;
  cart.forEach((i,idx)=>{
    total+=i.price*i.qty;
    const d=document.createElement("div");
    d.innerHTML=`
      ${i.name} NT$${i.price} × 
      <button onclick="chg(${idx},-1)">-</button>
      ${i.qty}
      <button onclick="chg(${idx},1)">+</button>
      <button onclick="del(${idx})">刪除</button>
    `;
    box.appendChild(d);
  });
  box.innerHTML+=`<hr><strong>總金額：NT$${total}</strong>`;
}

function chg(i,n){cart[i].qty+=n;if(cart[i].qty<=0)cart.splice(i,1);save();}
function del(i){cart.splice(i,1);save();}

function checkout(){
  if(!cart.length){alert("購物車是空的");return;}
  let msg="我要下單\n"; let total=0;
  cart.forEach((i,n)=>{
    total+=i.price*i.qty;
    msg+=`${n+1}. ${i.name} × ${i.qty} NT$${i.price*i.qty}\n`;
  });
  msg+=`\n總金額：NT$${total}`;
  location.href="https://line.me/R/oaMessage/@571whxyy"+encodeURIComponent(msg);
  localStorage.removeItem("cart");
}

render();
</script>
</body>
</html>
