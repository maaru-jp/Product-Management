<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>購物車</title>
</head>
<body>
<h1>購物車</h1>
<div id="cart"></div>
<button onclick="checkout()">結帳（LINE）</button>

<script>
const cart = JSON.parse(localStorage.getItem("cart") || "[]");
const container = document.getElementById("cart");
let total = 0;

cart.forEach((item, i) => {
  total += item.price;
  const div = document.createElement("div");
  div.innerText = `${i + 1}. ${item.name} NT$${item.price}`;
  container.appendChild(div);
});

container.innerHTML += `<hr><strong>總金額：NT$${total}</strong>`;

function checkout() {
  if (cart.length === 0) {
    alert("購物車是空的");
    return;
  }

  let message = "我要下單\n";
  cart.forEach((item, i) => {
    message += `${i + 1}. ${item.name}（${item.id}） NT$${item.price}\n`;
  });
  message += `\n總金額：NT$${total}`;

  const lineURL = "https://line.me/R/oaMessage/@你的LINEID/?" + encodeURIComponent(message);
  localStorage.removeItem("cart");
  location.href = lineURL;
}
</script>
</body>
</html>
