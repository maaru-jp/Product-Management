<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>商品列表</title>
</head>
<body>
<h1>商品列表</h1>

<select id="catFilter">
  <option value="">全部分類</option>
</select>

<div id="list"></div>
<a href="cart.html">🛒 查看購物車</a>

<script src="products.js"></script>
<script>
const list = document.getElementById("list");
const filter = document.getElementById("catFilter");

categories.forEach(c => {
  const o = document.createElement("option");
  o.value = c;
  o.innerText = c;
  filter.appendChild(o);
});

function render(cat="") {
  list.innerHTML = "";
  products.filter(p => p.active && (!cat || p.category===cat))
    .forEach(p => {
      const d = document.createElement("div");
      d.innerHTML = `
        <img src="${p.image}" width="200"><br>
        <strong>${p.name}</strong>（${p.category}）<br>
        NT$${p.price}<br>
        <a href="product.html?id=${p.id}">查看商品</a><hr>`;
      list.appendChild(d);
    });
}

filter.onchange = e => render(e.target.value);
render();
</script>
</body>
</html>
