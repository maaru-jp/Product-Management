
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>MAARU 日本萌物購</title>
<link rel="stylesheet" href="../assets/style.css">
</head>
<body>
<header><strong>MAARU 日本萌物購</strong> <a href="cart.html">🛒 購物車</a></header>
<div class="container">
  <div id="productGrid" class="grid"></div>
</div>
<script>
fetch('../data/products.json')
  .then(r=>r.json())
  .then(data=>{
    const grid=document.getElementById('productGrid');
    data.forEach(p=>{
      const d=document.createElement('div');
      d.className='card';
      d.innerHTML=`
        <span class="badge">${p.status}</span>
        <img src="${p.images[0]}" width="100%">
        <h4>${p.name}</h4>
        <p>$${p.price}</p>
        <button class="btn">加入購物車</button>
      `;
      grid.appendChild(d);
    });
  });
</script>
</body>
</html>
