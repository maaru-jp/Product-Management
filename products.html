<!DOCTYPE html><html lang='zh-Hant'><head><meta charset='UTF-8'><title>商品管理</title><link rel='stylesheet' href='../assets/css/admin.css'></head><body><h1>商品管理</h1><a href='product-edit.html'>＋新增商品</a><table><thead><tr><th>名稱</th><th>價格</th><th>狀態</th></tr></thead><tbody id='productTable'></tbody></table><script src='../assets/js/admin.js'></script><script>const t=document.getElementById("productTable");const p=JSON.parse(localStorage.getItem("products"))||[];t.innerHTML=p.map(i=>`<tr><td>${i.name}</td><td>${i.price}</td><td>${i.status==="active"?"上架":"下架"}</td></tr>`).join("");</script></body></html>
